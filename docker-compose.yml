version: '3.8'

services:
  # Jenkins para CI/CD
  jenkins:
    image: jenkins/jenkins:lts
    container_name: protech-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    environment:
      - JENKINS_OPTS=--httpPort=8080 --logfile=/var/jenkins_home/jenkins.log
    user: root
    networks:
      - protech-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplicación frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: protech-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - protech-network
    depends_on:
      jenkins:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Docker in Docker (para build de imágenes dentro de Jenkins)
  docker-in-docker:
    image: docker:dind
    container_name: protech-docker-dind
    restart: unless-stopped
    privileged: true
    volumes:
      - docker-in-docker-storage:/var/lib/docker
    networks:
      - protech-network
    command: --storage-driver overlay2

volumes:
  jenkins_home:
    driver: local
  docker-in-docker-storage:
    driver: local

networks:
  protech-network:
    driver: bridge

# Instrucciones de uso:
# 1. Iniciar: docker-compose up -d
# 2. Ver logs: docker-compose logs -f jenkins
# 3. Detener: docker-compose down
# 4. Acceder Jenkins: http://localhost:8080
# 5. Acceder Frontend: http://localhost
#
# Para obtener contraseña inicial de Jenkins:
# docker-compose exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword
