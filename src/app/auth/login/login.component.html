<div class="auth-container">
  <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
    <img src="../../../assets/ProTech.png" alt="Logo" class="logo-form" />
    <h2 class="typewriter">Iniciar Sesión</h2>

    <div class="form-group">
      <label for="email"><i class="fas fa-envelope"></i> Correo electrónico</label>
      <input type="email" id="email" name="email" [(ngModel)]="Correo" required />
    </div>

    <div class="form-group">
      <label for="password"><i class="fas fa-lock" style="color: #4f8df4;"></i> Contraseña</label>
      <div class="password-wrapper">
        <input [type]="showPassword ? 'text' : 'password'" id="password" name="password" [(ngModel)]="Contrasena" required />
        <button type="button" (click)="togglePasswordVisibility()" class="toggle-password">
          <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
    </div>

    <button type="submit" [disabled]="!loginForm.valid">Entrar</button>

    <div class="register-link">
      ¿No tienes una cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </div>
  </form>
</div>
