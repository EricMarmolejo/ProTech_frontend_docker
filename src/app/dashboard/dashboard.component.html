<div class="dashboard-layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo-container">
      <img src="../../assets/ProTech.png" alt="ProTech Logo" class="logo" />
    </div>
    <ul class="menu">
      <!-- Opción común: Inicio -->
      <li>
        <a routerLink="/dashboard/inicio" routerLinkActive="active">
          <i class="fas fa-home"></i> Inicio
        </a>
      </li>

      <!-- Menú solo para ADMIN -->
      <ng-container *ngIf="isAdmin()">
        <li>
          <a routerLink="/dashboard/usuarios" routerLinkActive="active">
            <i class="fas fa-users-cog"></i> Gestión de Usuarios
          </a>
        </li>

        <li>
          <a routerLink="/dashboard/productos" routerLinkActive="active">
            <i class="fas fa-boxes"></i> Productos
          </a>
        </li>

        <li>
          <a routerLink="/dashboard/categorias" routerLinkActive="active">
            <i class="fa-solid fa-layer-group"></i> Categorias
          </a>
        </li>

        <li>
          <a routerLink="/dashboard/reportes" routerLinkActive="active">
            <i class="fas fa-chart-line"></i> Reportes
          </a>
        </li>
        <li>
          <a routerLink="/dashboard/Pedidos" routerLinkActive="active">
            <i class="fa-solid fa-truck"></i> Pedidos
          </a>
        </li>
      </ng-container>

      <!-- Menú solo para USUARIO -->
      <ng-container *ngIf="!isAdmin()">
        <li>
          <a routerLink="/dashboard/perfil" routerLinkActive="active">
            <i class="fas fa-user-circle"></i> Mi Perfil
          </a>
        </li>
        <li>
          <a routerLink="/dashboard/lista_productos" routerLinkActive="active">
            <i class="fas fa-boxes"></i> Productos
          </a>
        </li>

        <li>
          <a routerLink="/dashboard/carrito" routerLinkActive="active">
            <i class="fas fa-shopping-cart"></i> Carrito
          </a>
        </li>

        <li>
          <a routerLink="/dashboard/Mis_pedidos" routerLinkActive="active">
            <i class="fa-solid fa-truck"></i> Mis pedidos
          </a>
        </li>
      </ng-container>

      <!-- Logout (para todos los usuarios) -->
      <li>
        <a (click)="logout()">
          <i class="fas fa-sign-out-alt"></i> Cerrar sesión
        </a>
      </li>
    </ul>
  </nav>

  <!-- Contenido dinámico -->
  <div class="main-content">
    <router-outlet></router-outlet>
  </div>
</div>
