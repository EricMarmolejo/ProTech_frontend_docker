<div class="form-wrapper animate-fade">
  <h2>{{ tipoMovimiento === 'entrada' ? 'Registrar Entrada' : 'Registrar Salida' }}</h2>

  <div class="form-grid">
    <div class="form-group">
      <label for="cantidad">Cantidad</label>
      <input type="number" id="cantidad" [(ngModel)]="cantidad" min="1" placeholder="Ingrese la cantidad" />
    </div>

    <div class="form-group">
      <label for="observaciones">Observaciones</label>
      <textarea id="observaciones" [(ngModel)]="observaciones" placeholder="Ingrese observaciones (opcional)"></textarea>
    </div>
  </div>

  <div class="form-button">
    <button type="button" (click)="cancelar()" class="btn-cancel">
      Cancelar
    </button>
    <button type="button" [disabled]="cargando" (click)="registrarMovimiento()" class="btn-confirm">
      {{ cargando ? 'Registrando...' : 'Registrar Movimiento' }}
    </button>
  </div>

  <p *ngIf="mensaje" class="mensaje exito">{{ mensaje }}</p>
  <p *ngIf="error" class="mensaje error">{{ error }}</p>
</div>
